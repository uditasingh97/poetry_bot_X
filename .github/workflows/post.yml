name: Daily poetry post

on:
  schedule:
    # Runs daily at 03:30 UTC = 9:00 AM IST. Adjust as you like.
    # Note: GitHub cron can drift by a few minutes to an hour under load.
    - cron: "30 3 * * *"
  workflow_dispatch: {}   # lets you trigger a post manually from the Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install tweepy

      - name: Post today's verse
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: python bot.py
